# 配信スケジュール・閾値設定

schedule:
  timezone: "Asia/Tokyo"
  daily_times:
    - "08:00"
    - "22:00"
  alert_check_interval_minutes: 5

# 臨時アラート閾値(単発トランザクション)
alert_thresholds:
  btc:
    inflow: 1000
    outflow: -1000
  eth:
    inflow: 10000
    outflow: -10000

# カウンターパーティ解決(誰から誰へ: 取引所/ETF/不明/内部移動)
counterparty:
  enabled: true
  # 同一custody内の振替(例: Coinbaseが管理するIBIT⇔BITB等)の扱い。
  #   true  = 完全に抑制(Discord/X とも出さない。DEBUGログには残す)
  #   false = Discordのみ muted 通知(Xには絶対出さない)
  suppress_internal: true
  dominance_ratio: 0.6      # 相手を1社に名寄せするのに必要な価値シェア(未満なら不明)
  batch_fanout_max: 5       # 外部受取先がこれ超なら名寄せせず「複数アドレスへ分散」
  label_max_age_days: 180   # labels.yaml as_of がこれより古いと公開Xでは不明扱い

# Notable自動生成
notable:
  lookback_days: 30
  consecutive_flow_min_days: 3
  significant_net_flow_btc: 500
  significant_net_flow_eth: 5000

# Discord Embed
embed:
  color_btc: 16167962    # #F7931A
  color_eth: 6398202     # #627EEA
  color_alert: 15409980  # #EB3B3C

# データソース固有
api:
  etherscan_base_url: "https://api.etherscan.io/v2/api"  # V2 (chainid付与必須、2025年中にV1廃止)
  # BTCソース。mempool.space は共有VPSのIPをCloudflareでブロック(接続タイムアウト)するため、
  # API互換(Esplora)の blockstream.info に切替(2026-06-30)。/address/{a}/txs・/tx/{id} は同形式。
  mempool_base_url: "https://blockstream.info/api"
  coingecko_base_url: "https://api.coingecko.com/api/v3"
  request_min_interval_ms: 100  # 連続呼び出し時の最低間隔
