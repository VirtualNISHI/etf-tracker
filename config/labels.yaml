# config/labels.yaml — OUR editorial counterparty labels ONLY.
#
# ToS-clean by construction:
#   - The runtime resolver reads ONLY this file + clusters.yaml. ZERO network calls.
#   - You (operator) build this OFFLINE. You MAY consult Nansen/Arkham offline to find
#     addresses, but this is YOUR curated, editorial list — never an auto-redistributed feed.
#   - Missing file is fine: every counterparty then degrades to 不明ウォレット (no crash).
#
# Matching rules:
#   - chain-scoped: a bitcoin address never matches an ethereum entry and vice-versa.
#   - ETH addresses are lowercased on load; BTC addresses are case-sensitive (kept verbatim).
#   - clusters.yaml (our ETF custody) is checked FIRST, so an address that is one of our ETF
#     wallets is labeled as that ETF even if also listed here.
#   - `as_of` older than thresholds.yaml counterparty.label_max_age_days (default 180d) =>
#     the label is treated as 不明 on PUBLIC X (still shown, marked 推定, on private Discord).
#
# Keep entries SPARSE and HIGH-CONFIDENCE. A wrong label posted publicly on X is worse than 不明.
# Use scripts/build_labels.py to append entries from an Arkham/Nansen TSV export.

version: 1

