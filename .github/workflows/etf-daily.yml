name: ETF Custody Daily Report

# JST 08:00 / 22:00 に Discord (#etf-flow-daily) へ自動配信。
# GitHub Actions の cron は UTC 解釈、かつピーク時に最大15分程度の遅延あり。
# 厳密な時刻配信が必要なら別の cron 基盤(VPS等)を検討。

on:
  schedule:
    - cron: '0 23 * * *'  # UTC 23:00 = JST 翌日 08:00
    - cron: '0 13 * * *'  # UTC 13:00 = JST 当日 22:00
  workflow_dispatch:       # Actions 画面から手動実行も可
    inputs:
      dry_run:
        description: "Generate everything but skip Discord/X posting (logs only)"
        type: boolean
        default: false

# 同時実行を抑制(8:00と22:00が同日内で被らないように直列化)
concurrency:
  group: etf-daily-report
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Japanese fonts (for X image post)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      # Notable の連続日数判定 / 過去30日最大検出のために、
      # sqlite history を実行間で保持する。
      # cache key に github.run_id を含めることで毎回新しい cache が作成され、
      # restore-keys で前回の cache を復元 → 履歴が積み上がる。
      - name: Restore sqlite history cache
        uses: actions/cache@v4
        with:
          path: data/history.sqlite
          key: etf-history-${{ github.run_id }}
          restore-keys: |
            etf-history-

      - name: Run daily ETF Custody report (--once)
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          DISCORD_WEBHOOK_DAILY: ${{ secrets.DISCORD_WEBHOOK_DAILY }}
          DISCORD_WEBHOOK_ALERT: ${{ secrets.DISCORD_WEBHOOK_ALERT }}
          # X (Twitter) — 4つの secret が登録されていれば自動で投稿
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          # LLM (jp_translator) — AI 解説生成。Gemini → OpenAI → Grok → DeepL の
          # フォールバックチェーン。全部空なら notable.py の決定論版にフォールバック。
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          # Scheduled runs always post. Manual runs honour the dry_run input.
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && 'true' || 'false' }}
          LOG_LEVEL: "INFO"
          PYTHONIOENCODING: "utf-8"
        run: uv run python -m src.main --once

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
